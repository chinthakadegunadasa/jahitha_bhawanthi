name: Generate Dhamma Book PDF

on:
  push:
    branches: [ main ]

jobs:
  render_pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install TinyTeX
        uses: r-lib/actions/setup-tinytex@v2

      - name: Install Packages
        run: |
          Rscript -e 'install.packages(c("rmarkdown", "knitr", "tikzDevice"))'

      - name: Install Sinhala Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-lklug-sinhala

      - name: Render PDF
        run: |
          # Render කරන විට font එක LKLUG ලෙස override කිරීම (GitHub Runner සඳහා)
          Rscript -e 'rmarkdown::render("book.Rmd", output_file="Dhamma_Book.pdf")'

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dhamma-Book
          path: Dhamma_Book.pdf
1          # .Rmd ගොනුවේ font එක "LKLUG" ලෙස වෙනස් කිරීමට මතක තබා ගන්න.

      - name: Render PDF
        run: |
          Rscript -e 'rmarkdown::render("book.Rmd", output_format = "pdf_document")'

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dhamma-Book-PDF
          path: book.pdf # මෙහි නම ඔබගේ .Rmd ගොනුවේ නමට සමාන විය යුතුය
          
