name: Render and Deploy Book

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: rocker/verse:latest # R, LaTeX, සහ Pandoc අඩංගු පරිසරය

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Install System Dependencies
        run: |
          apt-get update && apt-get install -y \
          fonts-lklug-sinhala \
          fonts-dejavu \
          fonts-noto-core

      - name: Install R Packages
        run: |
          Rscript -e 'install.packages(c("bookdown", "rmarkdown", "knitr"))'

      - name: Render Book (PDF)
        run: |
          Rscript -e 'bookdown::render_book("index.Rmd", "bookdown::pdf_book")'

      - name: Render Book (HTML)
        run: |
          Rscript -e 'bookdown::render_book("index.Rmd", "bookdown::gitbook")'

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Dhamma-Book-Output
          path: _book/

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_book
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dhamma-Book
          path: Dhamma_Book.pdf
          # .Rmd ගොනුවේ font එක "LKLUG" ලෙස වෙනස් කිරීමට මතක තබා ගන්න.

      - name: Render PDF
        run: |
          Rscript -e 'rmarkdown::render("book.Rmd", output_format = "pdf_document")'

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dhamma-Book-PDF
          path: book.pdf # මෙහි නම ඔබගේ .Rmd ගොනුවේ නමට සමාන විය යුතුය
          
