name: Render RMarkdown Book to PDF

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev pandoc

      - name: Install LaTeX (TinyTeX)
        uses: r-lib/actions/setup-tinytex@v2

      - name: Install R Packages
        run: |
          Rscript -e 'install.packages(c("rmarkdown", "knitr", "tinytex"))'

      - name: Install Sinhala Fonts
        run: |
          sudo apt-get install -y fonts-lklug-sinhala
          # සටහන: Iskoola Pota පද්ධතියේ නැතිනම් lklug font එක භාවිත වේ. 
          # .Rmd ගොනුවේ font එක "LKLUG" ලෙස වෙනස් කිරීමට මතක තබා ගන්න.

      - name: Render PDF
        run: |
          Rscript -e 'rmarkdown::render("book.Rmd", output_format = "pdf_document")'

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dhamma-Book-PDF
          path: book.pdf # මෙහි නම ඔබගේ .Rmd ගොනුවේ නමට සමාන විය යුතුය
          
